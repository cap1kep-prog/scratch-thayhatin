<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Scratch Classroom Pro - Nhúng Scratch thật</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Arial;background:#f2f3f5}
.topbar{background:#ff4d4f;color:#fff;padding:10px;display:flex;gap:10px;align-items:center}
.topbar button{background:#fff;color:#000;border:none;padding:6px 10px;border-radius:4px}
.topbar .submit{background:#1d4ed8;color:#fff}
.container{display:flex;height:calc(100vh - 50px)}
.editor{flex:1}
.editor iframe{width:100%;height:100%;border:none}
.side{width:320px;background:#fff;border-left:1px solid #ccc;display:flex;flex-direction:column}
.panel{padding:10px;border-bottom:1px solid #ccc}
.panel input{width:100%;margin-top:6px;padding:6px}
.panel button{margin-top:10px;width:100%;background:#1677ff;color:#fff;border:none;padding:8px}
.stage{flex:1;background:#eee;display:flex;align-items:center;justify-content:center}
.stage iframe{width:300px;height:220px;border:2px solid #333}
.success{color:green;font-size:13px;display:none}
</style>
</head>
<body>

<div class="topbar">
<button>Settings</button>
<button>Tập tin</button>
<button>Chỉnh sửa</button>
<button class="submit">Nộp bài cho thầy</button>
<button onclick="openScratch()" style="background:#22c55e;color:white;border:none;padding:6px 10px;border-radius:4px">🧩 Mở Scratch</button>
<input style="flex:1;padding:6px" placeholder="Tên project">
</div>

<div class="container">

<!-- NHÚNG SCRATCH THẬT -->
<div class="editor">
<!-- ❌ KHÔNG thể nhúng editor Scratch trực tiếp do bị chặn X-Frame-Options -->
<div style="padding:20px;text-align:center">
  <p>⚠️ Scratch không cho nhúng trực tiếp trình soạn thảo.</p>
  <a href="https://scratch.mit.edu/projects/editor" target="_blank">
    👉 Mở Scratch Editor ở tab mới
  </a>
</div>
</div>

<!-- BÊN PHẢI -->
<div class="side">

<div class="panel">
<h4>Nộp bài</h4>
<input id="name" placeholder="Họ tên">
<input id="class" placeholder="Lớp">
<input id="title" placeholder="Tên bài">
<input id="link" placeholder="Link Scratch">
<button onclick="submitData()">🚀 Nộp bài</button>
<div class="success" id="msg">✅ Đã nộp!</div>
</div>

<div class="stage">
<iframe id="preview"></iframe>
</div>

</div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbyfTDZlISiE8UTrQMfnM2nLINrjf6QbSnqgcyHH8JVdWu0DKryVNO1nfq7JB4txElZxgg/exec";

function convert(link){
 if(link.includes("projects/")){
  let id=link.split("projects/")[1];
  return "https://scratch.mit.edu/projects/"+id+"/embed";
 }
 return "";
}

function submitData(){
 let data={
  name:document.getElementById('name').value,
  class:document.getElementById('class').value,
  title:document.getElementById('title').value,
  link:document.getElementById('link').value
 };
 if(!data.name||!data.class||!data.title||!data.link){alert("Nhập đủ thông tin");return}

 fetch(API_URL,{method:"POST",body:JSON.stringify(data)})
 .then(()=>{
  document.getElementById('msg').style.display='block';
  let embed=convert(data.link);
  if(embed){document.getElementById('preview').src=embed}
 })
}
function openScratch(){
  window.open("https://scratch.mit.edu/projects/editor","_blank");
}

</script>

</body>
</html>
