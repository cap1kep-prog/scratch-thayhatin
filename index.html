<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nộp bài Scratch</title>

<style>
body{
  font-family: Arial;
  max-width: 420px;
  margin: auto;
  padding: 20px;
  background: #f5f5f5;
}
h2{text-align:center}
input, button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:1px solid #ccc;
}
button{
  border:none;
  color:white;
  cursor:pointer;
}
.btn-scratch{background:#22c55e;}
.btn-submit{background:#1677ff;}
.note{
  font-size:13px;
  color:#555;
}
</style>

</head>

<body>

<h2>🎓 Nộp bài Scratch</h2>

<!-- MỞ SCRATCH -->
<button class="btn-scratch" onclick="openScratch()">
🧩 Mở Scratch để làm bài
</button>

<p class="note">
👉 Sau khi làm xong: File → Save to your computer (.sb3)
</p>

<input id="name" placeholder="Họ tên">
<input id="class" placeholder="Lớp">
<input id="title" placeholder="Tên bài">

<input type="file" id="file" accept=".sb3">

<button class="btn-submit" onclick="submitData()">
🚀 Nộp bài
</button>

<script src="script.js"></script>

</body>
</html>
